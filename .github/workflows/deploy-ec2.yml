# main 에 push → EC2 에서 git pull + buyma-manage 재시작 (1~2분 내 반영)
#
# GitHub: 이 repo → Settings → Secrets and variables → Actions → New repository secret
#   필수
#     EC2_HOST    공인 IP (예: 43.200.228.173)
#     EC2_SSH_KEY 로컬 buyma-key.pem 파일 "전체" 텍스트
#   선택 (다를 때만)
#     EC2_USER    기본 ssh 사용자 (미설정 시 ubuntu)
#     EC2_REPO_PATH  레포 절대경로 (미설정 시 /home/ubuntu/buyma/buyma)

name: Deploy EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull on server & restart buyma-manage
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            REPO_PATH="${{ secrets.EC2_REPO_PATH }}"
            if [ -z "$REPO_PATH" ]; then REPO_PATH="/home/ubuntu/buyma/buyma"; fi
            cd "$REPO_PATH"
            # origin/main 을 그대로 따라가도록 강제 정렬.
            # force-push 등으로 서버 로컬 히스토리가 갈라져도(divergent) pull 에러 없이
            # 항상 origin/main 상태로 맞춘다. (서버 로컬 변경분은 버려짐 — 배포 타겟이므로 의도된 동작)
            git fetch origin main
            git reset --hard origin/main

            # manage_server는 시작 시 백그라운드 스레드가 자동으로 캐시를 빌드함.
            # 재시작 직후 ~1~2분간은 /manage/products/data.json이 503 (loading) 응답,
            # 클라이언트가 5초 간격으로 자동 재시도.
            sudo systemctl restart buyma-manage
