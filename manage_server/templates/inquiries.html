<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>현업 문의 관리 · manage</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; font-size: 14px; color: #222; max-width: 1280px; }
    h1 { font-size: 1.2rem; margin: 0 0 4px; }
    .sub { color: #666; font-size: 13px; margin: 0 0 16px; }
    .sub a { color: #0969da; }
    .card {
      border: 1px solid #d0d7de; border-radius: 10px; padding: 14px 16px;
      margin-bottom: 16px; background: #fff;
    }
    .card h2 { font-size: 0.98rem; margin: 0 0 10px; }
    .addgrid {
      display: grid; grid-template-columns: repeat(2, minmax(160px, 1fr)) 2fr; gap: 10px 14px; align-items: end;
    }
    .fld { display: flex; flex-direction: column; gap: 3px; font-size: 12px; }
    .fld label { font-weight: 600; color: #444; }
    .fld label .req { color: #b00; }
    .fld input, .fld textarea {
      padding: 6px 8px; font-size: 13px; border: 1px solid #c9c9c9; border-radius: 6px;
      font-family: inherit; width: 100%; box-sizing: border-box;
    }
    .fld textarea { min-height: 38px; resize: vertical; }
    .fld.wide { grid-column: 1 / -1; }
    .addbar { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
    button {
      padding: 7px 14px; font-size: 13px; border-radius: 7px; border: 1px solid #c9c9c9;
      background: #f6f8fa; cursor: pointer; font-weight: 600;
    }
    button:hover:not(:disabled) { background: #eef1f4; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.add { border-color: #1a7f37; color: #1a7f37; }
    button.del { border-color: #b00; color: #b00; padding: 4px 10px; font-size: 12px; }
    .msg { font-size: 12px; font-weight: 600; }
    .msg.err { color: #b00; }
    .msg.ok { color: #1a7f37; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { border: 1px solid #e1e4e8; padding: 7px 8px; text-align: left; vertical-align: top; }
    th { background: #f6f8fa; font-weight: 700; position: sticky; top: 0; white-space: nowrap; }
    td.content { white-space: pre-wrap; word-break: break-word; min-width: 220px; }
    td a { color: #0969da; word-break: break-all; }
    tr.st-done { background: #f3f8f3; color: #777; }
    tr.st-doing { background: #fffaf0; }
    select.status { padding: 4px 6px; font-size: 12px; border-radius: 6px; border: 1px solid #c9c9c9; font-weight: 600; }
    select.status.s-확인 { color: #57606a; }
    select.status.s-처리중 { color: #9a6700; border-color: #e0c060; }
    select.status.s-완료 { color: #1a7f37; border-color: #a3d3a8; }
    .cnt { color: #666; font-size: 12px; margin-left: 8px; }
    input.res, textarea.res {
      width: 100%; box-sizing: border-box; padding: 5px 7px; font-size: 12px;
      border: 1px solid #d0d7de; border-radius: 6px; font-family: inherit;
    }
    textarea.res { min-height: 34px; resize: vertical; }
    .nowrap { white-space: nowrap; }
    .empty { color: #888; padding: 18px; text-align: center; }
  </style>
</head>
<body>
  <h1>현업 문의 관리</h1>
  <p class="sub">
    소싱처-바이마 재고/품절 불일치 등 현업 문의를 행으로 기록합니다. ·
    <a href="/manage">DB 조회</a> ·
    <a href="/manage/products/">상품 통계</a> ·
    <a href="/manage/tasks">관리 작업</a> ·
    <a href="/manage/logout">로그아웃</a>
  </p>

  <div class="card">
    <h2>새 문의 추가</h2>
    <div class="addgrid">
      <div class="fld"><label>buyma_product_id</label><input id="a_bpid" placeholder="예: 133501061"></div>
      <div class="fld"><label>mall</label><input id="a_mall" placeholder="예: okmall, maniaon"></div>
      <div class="fld"><label>brand</label><input id="a_brand" placeholder="예: A.P.C."></div>
      <div class="fld"><label>작성자</label><input id="a_author" placeholder="문의 작성자"></div>
      <div class="fld"><label>buyma_url</label><input id="a_burl" placeholder="https://www.buyma.com/item/..."></div>
      <div class="fld"><label>product_url (소싱처)</label><input id="a_purl" placeholder="https://smartstore.naver.com/..."></div>
      <div class="fld wide"><label>문의내용 <span class="req">*필수</span></label><textarea id="a_content" placeholder="예: 소싱처 품절인데 바이마에 올라가 있어요"></textarea></div>
    </div>
    <div class="addbar">
      <button class="add" id="addBtn" onclick="addRow()">+ 추가</button>
      <span class="msg" id="addMsg"></span>
    </div>
  </div>

  <div class="card">
    <h2>문의 목록 <span class="cnt" id="cnt"></span></h2>
    <div style="overflow:auto; max-height: 70vh;">
      <table>
        <thead>
          <tr>
            <th class="nowrap">등록일</th>
            <th>buyma_id</th>
            <th>BUYMA</th>
            <th>소싱처</th>
            <th>mall</th>
            <th>brand</th>
            <th>작성자</th>
            <th>문의내용</th>
            <th class="nowrap">상태</th>
            <th>답변자</th>
            <th>처리내용</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="12" class="empty">불러오는 중…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function linkCell(url, label){
  if(!url) return '';
  return `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(label||url)}</a>`;
}

async function load(){
  try{
    const r = await fetch('/manage/inquiries/data.json');
    const j = await r.json();
    render(j.rows || []);
  }catch(e){
    $('tbody').innerHTML = `<tr><td colspan="12" class="empty">불러오기 실패: ${esc(e)}</td></tr>`;
  }
}

function render(rows){
  $('cnt').textContent = `${rows.length}건`;
  if(!rows.length){
    $('tbody').innerHTML = `<tr><td colspan="12" class="empty">문의가 없습니다.</td></tr>`;
    return;
  }
  $('tbody').innerHTML = rows.map(rowHtml).join('');
}

const STATUSES = ['확인', '처리중', '완료'];

function trClass(status){
  if(status === '완료') return 'st-done';
  if(status === '처리중') return 'st-doing';
  return '';
}

function statusSelect(r){
  const st = r.status || '확인';
  const opts = STATUSES.map(s => `<option value="${s}" ${s===st?'selected':''}>${s}</option>`).join('');
  return `<select class="status s-${st}" data-prev="${st}" onchange="changeStatus(${r.id}, this)">${opts}</select>`;
}

function rowHtml(r){
  const created = (r.created_at||'').slice(0,16);
  const burl = r.buyma_url || (r.buyma_product_id ? `https://www.buyma.com/item/${esc(r.buyma_product_id)}/` : '');
  return `<tr class="${trClass(r.status)}" data-id="${r.id}">
    <td class="nowrap">${esc(created)}</td>
    <td class="nowrap">${esc(r.buyma_product_id||'')}</td>
    <td>${linkCell(burl, '열기')}</td>
    <td>${linkCell(r.product_url, '열기')}</td>
    <td>${esc(r.mall||'')}</td>
    <td>${esc(r.brand||'')}</td>
    <td>${esc(r.author||'')}</td>
    <td class="content">${esc(r.content||'')}</td>
    <td class="nowrap">${statusSelect(r)}</td>
    <td><input class="res" placeholder="답변자" value="${esc(r.responder||'')}" onchange="saveField(${r.id}, 'responder', this)"></td>
    <td><textarea class="res" placeholder="처리내용" onblur="saveField(${r.id}, 'resolution', this)">${esc(r.resolution||'')}</textarea></td>
    <td class="nowrap"><button class="del" onclick="delRow(${r.id})">삭제</button></td>
  </tr>`;
}

async function addRow(){
  const content = $('a_content').value.trim();
  const msg = $('addMsg');
  if(!content){ msg.className='msg err'; msg.textContent='문의내용은 필수입니다.'; return; }
  $('addBtn').disabled = true; msg.className='msg'; msg.textContent='저장 중…';
  const body = {
    buyma_product_id: $('a_bpid').value.trim(),
    buyma_url: $('a_burl').value.trim(),
    product_url: $('a_purl').value.trim(),
    mall: $('a_mall').value.trim(),
    brand: $('a_brand').value.trim(),
    author: $('a_author').value.trim(),
    content,
  };
  try{
    const r = await fetch('/manage/inquiries', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    const j = await r.json();
    if(!r.ok) throw new Error(j.error || r.status);
    ['a_bpid','a_burl','a_purl','a_mall','a_brand','a_author','a_content'].forEach(id => $(id).value='');
    msg.className='msg ok'; msg.textContent='추가됨';
    setTimeout(()=>{ msg.textContent=''; }, 1500);
    await load();
  }catch(e){
    msg.className='msg err'; msg.textContent='실패: '+e;
  }finally{
    $('addBtn').disabled = false;
  }
}

async function patch(id, changes){
  const r = await fetch(`/manage/inquiries/${id}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({changes})});
  if(!r.ok){ const j = await r.json().catch(()=>({})); throw new Error(j.error || r.status); }
  return r.json();
}

async function changeStatus(id, el){
  const tr = el.closest('tr');
  const prev = el.dataset.prev || '확인';
  try{
    await patch(id, {status: el.value});
    el.className = 'status s-' + el.value;
    el.dataset.prev = el.value;
    tr.className = trClass(el.value);
  }catch(e){
    el.value = prev;
    alert('상태 저장 실패: '+e);
  }
}

async function saveField(id, field, el){
  try{
    await patch(id, {[field]: el.value});
  }catch(e){
    alert('저장 실패('+field+'): '+e);
  }
}

async function delRow(id){
  if(!confirm('이 문의를 삭제할까요?')) return;
  try{
    const r = await fetch(`/manage/inquiries/${id}`, {method:'DELETE'});
    if(!r.ok && r.status!==204){ const j = await r.json().catch(()=>({})); throw new Error(j.error || r.status); }
    await load();
  }catch(e){
    alert('삭제 실패: '+e);
  }
}

// Ctrl+Enter 로 추가
$('a_content').addEventListener('keydown', (e)=>{ if((e.ctrlKey||e.metaKey)&&e.key==='Enter') addRow(); });

load();
</script>
</body>
</html>
